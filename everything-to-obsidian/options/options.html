<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Everything to Obsidian — 设置</title>
  <style>
    :root {
      --color-bg: #1e1e2e;
      --color-bg-card: #2a2a3e;
      --color-border: #3a3a55;
      --color-primary: #7c6af5;
      --color-primary-hover: #6a58e0;
      --color-success: #5fc87e;
      --color-text: #e0e0f0;
      --color-text-muted: #9090b0;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-bg);
      padding: 24px;
      max-width: 500px;
    }
    h1 { font-size: 18px; margin-bottom: 20px; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .section {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    .field { margin-bottom: 12px; }
    .field label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--color-text-muted); }
    .field input[type=text] {
      width: 100%;
      padding: 7px 10px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 5px;
      color: var(--color-text);
      font-size: 13px;
      font-family: var(--font);
    }
    .field input[type=text]:focus { outline: none; border-color: var(--color-primary); }
    .dir-display {
      padding: 7px 10px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 5px;
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 8px;
      min-height: 34px;
    }
    .dir-display.granted { color: var(--color-success); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 16px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
    }
    .btn--primary { background: var(--color-primary); color: #fff; }
    .btn--primary:hover { background: var(--color-primary-hover); }
    select {
      width: 100%;
      padding: 7px 10px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 5px;
      color: var(--color-text);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      appearance: auto;
    }
    select:disabled { opacity: 0.5; cursor: not-allowed; }
    select:focus { outline: none; border-color: var(--color-primary); }
    .save-hint { font-size: 12px; color: var(--color-success); margin-top: 6px; display: none; }
  </style>
</head>
<body>
  <h1>📖 Everything to Obsidian 设置</h1>

  <section class="section">
    <h2>授权读写目录</h2>
    <div id="dir-display" class="dir-display">未授权</div>
    <button id="btn-pick-dir" class="btn btn--primary">📁 选择授权目录</button>
  </section>

  <section class="section">
    <h2>文件存储</h2>
    <div class="field">
      <label for="select-subdir">保存到子目录</label>
      <select id="select-subdir" disabled>
        <option value="">请先选择授权目录</option>
      </select>
    </div>
    <!-- 新建目录区域（选择「新建目录...」时显示） -->
    <div id="new-dir-area" style="display:none" class="field">
      <label for="input-new-dir">新目录名称</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" id="input-new-dir" placeholder="例如：Clippings" />
        <button id="btn-create-dir" class="btn btn--primary">确认创建</button>
      </div>
    </div>
    <div id="save-hint" class="save-hint">✅ 已保存</div>
  </section>

  <script type="module" src="options.js"></script>
</body>
</html>
