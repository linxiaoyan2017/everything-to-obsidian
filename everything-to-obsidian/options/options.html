<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Everything to Obsidian — 设置</title>
  <style>
    :root {
      --color-bg:           #FAFAF9;
      --color-bg-card:      #FFFFFF;
      --color-bg-hover:     #FEF3C7;
      --color-border:       #E7E5E4;
      --color-primary:      #F59E0B;
      --color-primary-hover:#D97706;
      --color-success:      #16A34A;
      --color-danger:       #DC2626;
      --color-text:         #1C1917;
      --color-text-muted:   #78716C;
      --color-text-subtle:  #A8A29E;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-bg);
      padding: 24px;
      max-width: 520px;
    }

    /* Header */
    .page-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #F0EDE8;
    }
    .page-header img {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .page-header h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--color-text);
    }

    /* Section 卡片 */
    h2 {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--color-text-subtle);
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .section {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 3px rgba(28,25,23,0.04);
    }

    /* Field */
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: var(--color-text-muted);
    }
    .field input[type=text] {
      width: 100%;
      padding: 7px 10px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 5px;
      color: var(--color-text);
      font-size: 13px;
      font-family: var(--font);
      transition: border-color .15s;
    }
    .field input[type=text]:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(245,158,11,0.12);
    }

    /* 目录显示框 */
    .dir-display {
      padding: 7px 10px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 5px;
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 10px;
      min-height: 34px;
    }
    .dir-display.granted {
      color: #15803D;
      background: #F0FDF4;
      border-color: #BBF7D0;
    }

    /* 按钮 */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      transition: background .15s;
    }
    .btn--primary {
      background: var(--color-primary);
      color: #1C1917;
      font-weight: 700;
      box-shadow: 0 1px 2px rgba(245,158,11,0.2);
    }
    .btn--primary:hover { background: var(--color-primary-hover); }
    .btn--ghost {
      background: transparent;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }
    .btn--ghost:hover {
      background: var(--color-bg-hover);
      color: var(--color-text);
      border-color: var(--color-primary);
    }

    /* Select 下拉框 */
    select {
      width: 100%;
      padding: 7px 10px;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 5px;
      color: var(--color-text);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      appearance: auto;
      transition: border-color .15s;
    }
    select:disabled { opacity: 0.5; cursor: not-allowed; }
    select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(245,158,11,0.12);
    }

    /* 保存提示 */
    .save-hint {
      font-size: 12px;
      color: var(--color-success);
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <img src="../icons/bee.png" alt="�" />
    <h1>Everything to Obsidian 设置</h1>
  </header>

  <section class="section">
    <h2>授权读写目录</h2>
    <div id="dir-display" class="dir-display">未授权</div>
    <button id="btn-pick-dir" class="btn btn--primary">📁 选择授权目录</button>
  </section>

  <section class="section">
    <h2>文件存储</h2>
    <div class="field">
      <label for="select-subdir">保存到子目录</label>
      <select id="select-subdir" disabled>
        <option value="">请先选择授权目录</option>
      </select>
    </div>
    <!-- 新建目录区域（选择「新建目录...」时显示） -->
    <div id="new-dir-area" style="display:none" class="field">
      <label for="input-new-dir">新目录名称</label>
      <input type="text" id="input-new-dir" placeholder="例如：Clippings" style="margin-bottom:10px;" />
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="btn-cancel-dir" class="btn btn--ghost">取消</button>
        <button id="btn-create-dir" class="btn btn--primary">确认创建</button>
      </div>
    </div>
    <div id="save-hint" class="save-hint">✅ 已保存</div>
  </section>

  <!-- 底部完成按钮 -->
  <div style="display:flex; justify-content:flex-end; margin-top:8px;">
    <button id="btn-done" class="btn btn--primary">完成设置 →</button>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
